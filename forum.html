<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT-Tracker Fórum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/global.js" defer></script>
</head>

<body>
    <header class="azul">
        <div class="conteiner">
            <nav class="navbar align-items-center">
                <a href="index.html" class="titulo-site">
                    <h1>IT-Tracker</h1>
                </a>

                <ul class="menu mb-0">
                    <li><a class="menu-link" href="index.html">Home</a></li>
                    <li><a class="menu-link" href="equipe.html">Equipe</a></li>
                    <li><a class="menu-link ativo" href="forum.html">Fórum</a></li>
                </ul>

                <a href="perfil.html">
                    <img class="img-perfil" src="img/account-white-icon.webp" alt="Ícone Perfil">
                </a>
            </nav>
        </div>
    </header>

    <main class="container py-4">
        <div class="painel-forum">

            <div class="topo-forum mb-4">
                <div class="caixa-pesquisa">
                    <input type="text" placeholder="Pesquisar no fórum..." class="campo-pesquisa">
                    <span class="icone-lupa"> <img src="img/lupa.png" alt="Ícone-Lupa" class="img-icone"></span>
                </div>

                <div class="filtro-forum">
                    <div id="header-opcao" class="header-opcao">Todas perguntas</div>

                    <ul class="filtro-menu">
                        <li>
                            <input type="radio" name="filtro-opcoes" id="todas-perguntas" class="opcoes-expansivel"
                                checked>
                            <label for="todas-perguntas" class="opcoes-label">Todas perguntas</label>
                        </li>
                        <li>
                            <input type="radio" name="filtro-opcoes" id="perguntas-respondidas"
                                class="opcoes-expansivel">
                            <label for="perguntas-respondidas" class="opcoes-label">Respondidas</label>
                        </li>
                        <li>
                            <input type="radio" name="filtro-opcoes" id="perguntas-naoRespondidas"
                                class="opcoes-expansivel">
                            <label for="perguntas-naoRespondidas" class="opcoes-label">Não respondidas</label>
                        </li>
                    </ul>
                </div>
            </div>

            <div id="container-comentarios" class="row g-4">
                <div class="col-12 col-md-6">
                    <div id="bloco-pergunta" class="bloco-pergunta d-flex flex-column justify-content-between p-4 h-100">
                        <div>
                            <h5 id="autor-pergunta" class="autor-pergunta"></h5>
                            <textarea id="campo-pergunta"
                                placeholder="Faça sua pergunta ou comentário para o IT-Tracker..."
                                class="campo-pergunta mt-3"
                                style="width: 100%; min-height: 120px; border-radius: 8px; border: 1px solid var(--cinza); padding: 10px;"></textarea> 
                        </div>

                        <div class="text-end login-submit mt-3">
                            <button id="botaoPublicar" class="botao-publicar">Publicar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>    
    </main>

    <footer class="rodape-site">
        <div>
            <p class="direitos-autorais">&copy; 2026 IT-Tracker. Todos os direitos reservados.</p>
        </div>
    </footer>

    <div class="modal fade" id="modalExcluirComentario" tabindex="-1" aria-labelledby="modalExcluirComentarioLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-white" style="background-color: var(--azul-escuro); border: 2px solid rgb(255, 57, 57); border-radius: 12px;">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalExcluirComentarioLabel" style="color: rgb(255, 57, 57);">Apagar Pergunta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="m-0 text-center">Tem certeza que deseja apagar a sua pergunta permanentemente?</p>
                </div>
                <div class="modal-footer border-0 d-flex justify-content-center gap-3">
                    <button type="button" class="botao-submit botao-animado" style="background-color: var(--cinza); color: #000; padding: 8px 25px;" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btnConfirmarExcluirComentario" class="botao-submit botao-animado" style="background-color: rgb(255, 57, 57); color: white; padding: 8px 25px;">Sim, apagar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/filtro-forum.js"></script>
    <script type="module" src="js/gerenciaLogin.js"></script>
    <script type="module" src="js/forum.js"></script>

</body>
</html>
