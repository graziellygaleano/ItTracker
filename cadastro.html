<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Tracker Cadastrar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="azul login">
    <div class="logo">
        <a href="index.html" class="titulo-site"><h1>IT-Tracker</h1></a>
    </div>

    <div class="row flex-grow-1 d-flex align-items-center justify-content-center w-100 m-0">
        <div class="col-11 col-md-5">
            <div class="caixa-login">
                <h2 class="titulo-login">Cadastrar</h2>

                <form id="formulario">
                    <div class="bloco-input">
                        <label>Nome</label>
                        <div class="linha-input">
                            <span class="icone"> <img src="img/747959.png" alt="Ícone-Usuário" class="img-icone"></span>
                            <input type="name" placeholder="Digite seu nome..." class="texto-input" required>
                        </div>
                    </div>

                    <div class="bloco-input">
                        <label>E-mail</label>
                        <div class="linha-input">
                            <span class="icone"> <img src="img/5562469.png" alt="Ícone-Usuário" class="img-icone"></span>
                            <input type="email" placeholder="Digite seu e-mail..." class="texto-input" required>
                        </div>
                    </div>

                    <div class="bloco-input">
                        <label>Senha</label>

                        <div class="linha-input">
                            <span class="icone"> <img src="img/1000915.png" alt="Ícone-Usuário" class="img-icone"></span>
                            <input type="password" placeholder="Digite sua senha..." class="texto-input" required>
                        </div>
                    </div>  

                <div class="login-submit">
                    <button type="submit" class="botao-submit">Cadastrar</button>
                </div>
                </form>

                <div class="botao-voltar">
                    <p class="link-mudar-tela">
                        Já possui um cadastro? Faça seu <a class="decoracao-login" href="login.html">Login.</a>
                    </p>
                </div>

                <div class="botao-voltar">
                    <a href="index.html" class="link-voltar">Voltar para a página Home</a>   
                </div>                                 
            </div>
        </div>
    </div>
</body>
</html>
