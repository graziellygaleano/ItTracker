<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT-Tracker Fórum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/global.js" defer></script>
</head>

<body>
    <header class="azul">
        <div class="conteiner">
            <nav class="navbar align-items-center">
                <a href="index.html" class="titulo-site">
                    <h1>IT-Tracker</h1>
                </a>

                <ul class="menu mb-0">
                    <li><a class="menu-link" href="index.html">Home</a></li>
                    <li><a class="menu-link" href="equipe.html">Equipe</a></li>
                    <li><a class="menu-link ativo" href="forum.html">Fórum</a></li>
                </ul>

                <a href="perfil.html">
                    <img class="img-perfil" src="img/account-white-icon.webp" alt="Ícone Perfil">
                </a>
            </nav>
        </div>
    </header>

    <main class="container py-4">
        <div class="painel-forum">

            <div class="topo-forum mb-4">
                <div class="caixa-pesquisa">
                    <input type="text" placeholder="Pesquisar no fórum..." class="campo-pesquisa">
                    <span class="icone-lupa"> <img src="img/lupa.png" alt="Ícone-Lupa" class="img-icone"></span>
                </div>

                <div class="filtro-forum">
                    <div id="header-opcao" class="header-opcao">Todas perguntas</div>

                    <ul class="filtro-menu">
                        <li>
                            <input type="radio" name="filtro-opcoes" id="todas-perguntas" class="opcoes-expansivel" checked>
                            <label for="todas-perguntas" class="opcoes-label">Todas perguntas</label>
                        </li>
                        <li>
                            <input type="radio" name="filtro-opcoes" id="perguntas-respondidas" class="opcoes-expansivel">
                            <label for="perguntas-respondidas" class="opcoes-label">Respondidas</label>
                        </li>
                        <li>
                            <input type="radio" name="filtro-opcoes" id="perguntas-naoRespondidas" class="opcoes-expansivel">
                            <label for="perguntas-naoRespondidas" class="opcoes-label">Não respondidas</label>
                        </li>
                    </ul>
                </div>
            </div>

            <div id="container-comentarios" class="row g-4">
                
                <div class="col-12 col-md-6">
                    <div class="bloco-pergunta d-flex flex-column justify-content-between p-4">
                        <div>
                            <h5 class="autor-pergunta" style="color: var(--amarelo); font-weight: bold;">IT-Tracker</h5>
                            <p class="texto-pergunta mt-3">
                                Você está visualizando o fórum como <strong>Visitante</strong>. 
                                Se quiser interagir, fazer perguntas ou responder a outros usuários, você precisa fazer o seu login ou criar uma conta.
                            </p>
                        </div>

                        <div class="text-end login-submit mt-3">
                            <a href="login.html" class="botao-publicar text-decoration-none d-inline-block">Fazer Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>    
    </main>

    <footer class="rodape-site">
        <div>
            <p class="direitos-autorais">&copy; 2026 IT-Tracker. Todos os direitos reservados.</p>
        </div>
    </footer>
    <script src="js/filtro-forum.js"></script>
    <script type="module" src="js/gerenciaLogin.js"></script>
    <script type="module" src="js/forum.js"></script>

</body>

</html>
