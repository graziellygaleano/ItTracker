<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT-Tracker Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="azul login">
    <div class="logo">
        <a href="index.html" class="titulo-site"><h1>IT-Tracker</h1></a>
    </div>

    <div class="row flex-grow-1 d-flex align-items-center justify-content-center w-100 m-0">
        <div class="col-11 col-md-5">
            <div class="caixa-login">
                <h2 class="titulo-login">Login</h2>

                <form id="formulario">

                    <div class="bloco-input">
                        <label>E-mail</label>
                        <div class="linha-input">
                            <span class="icone"> <img src="img/5562469.png" alt="Ícone-Usuário" class="img-icone"></span>
                            <input name="email" type="email" placeholder="Digite seu e-mail..." class="texto-input" required>
                        </div>
                    </div>

                    <div class="bloco-input">
                        <label>Senha</label>

                        <div class="linha-input">
                            <span class="icone"> <img src="img/1000915.png" alt="Ícone-Usuário" class="img-icone"></span>
                            <input name="senha" type="password" placeholder="Digite sua senha..." class="texto-input" required>
                        </div>
                    </div>  

                <div class="login-submit botao-animado">
                    <button type="submit" class="botao-submit">Login</button>
                </div>
                </form>

                <div class="botao-voltar">
                    <p class="link-mudar-tela">
                        Não possui um login? Faça seu <a class="decoracao-login" href="cadastro.html">Cadastro.</a></p>
                </div>

                <div class="botao-voltar">
                    <a href="index.html" class="link-voltar">Voltar para a página Home</a>   
                </div>                
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalErroLogin" tabindex="-1" aria-labelledby="modalErroLoginLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-white" style="background-color: var(--azul-escuro); border: 2px solid rgb(255, 57, 57); border-radius: 12px;">

                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalErroLoginLabel" style="color: rgb(255, 57, 57);">Erro de Autenticação</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <p class="m-0 text-center">Email ou senha incorreto!</p>
                </div>

                <div class="modal-footer border-0 d-flex justify-content-center">
                    <button type="button" class="botao-submit botao-animado" style="background-color: var(--cinza); color: #000; padding: 8px 25px;" data-bs-dismiss="modal">
                        Voltar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/login.js"></script>
    <script type="module" src="js/gerenciaLogin.js"></script>
</body>
</html>
